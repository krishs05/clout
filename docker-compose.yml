version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: clout-db
    environment:
      POSTGRES_USER: clout
      POSTGRES_PASSWORD: clout_password
      POSTGRES_DB: clout
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clout"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: clout-api
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://clout:clout_password@postgres:5432/clout?schema=public
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      DISCORD_REDIRECT_URI: ${DISCORD_REDIRECT_URI}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: clout-bot
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://clout:clout_password@postgres:5432/clout?schema=public
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}
      API_URL: http://api:3001
    depends_on:
      - api

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: clout-web
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_DISCORD_CLIENT_ID: ${NEXT_PUBLIC_DISCORD_CLIENT_ID}
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data: